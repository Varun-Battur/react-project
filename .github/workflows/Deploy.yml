name: auto deployment
on: 
    push: 
        branches:
            - main
            - 'feature/'
    workflow_dispatch:
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
            #   run: |
                # echo "cloning repo...."
                # echo "${{toJson(github)}}"
                # git clone https://github.com/${{github.repository}}.git
              uses: actions/checkout@v4
            - name: Install node 24
              uses: actions/setup-node@v4
              with: 
                node-version: 24
            - name: print node version
              run: node -v
            - name: Install dependencies
              run: npm install
            - name: Run Tests
              run: npm run test
    build:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Get the code
              uses: actions/checkout@v4
            - name: Install node 24
              uses: actions/setup-node@v4
              with:
                node-version: 24
            - name: Install dependecies
              run: npm install
            - name: build project
              run: npm run build
            - name: upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                name: github-pages
                path: dist
    deploy:
        needs: build
        runs-on: ubuntu-latest

        permissions:
            pages: write
            id-token: write
        
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}    
        steps:
            - name: Deploy to GitHub pages
              id: deployment
              uses: actions/deploy-pages@v4
              with: 
                token: ${{secrets.GITHUB_TOKEN}}